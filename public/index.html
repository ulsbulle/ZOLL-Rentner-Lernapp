<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Master 2.7.1 - Physics & Sound</title>
    <link rel="icon" href="https://fav.farm/🚀" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #progress-bar { transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .game-viewport { position: relative; background: #0f172a; border: 8px solid #1e293b; border-radius: 2rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        #game-canvas, #home-canvas { cursor: crosshair; display: block; touch-action: none; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-slate-900 tracking-tight mb-2">QUIZ<span class="text-blue-600">AI</span></h1>
            <p class="text-slate-500 font-medium italic italic">Physics & Sound Engine ©ZOLL-Rentner</p>
        </div>

        <div id="setup-card" class="space-y-6">
            <div class="glass-card shadow-2xl rounded-3xl p-8 border border-white">
                <div class="space-y-6">
                    <select id="Modus" class="w-full p-4 rounded-2xl border-2 border-slate-200 focus:border-blue-500 outline-none font-bold bg-white/50 text-slate-700">
                        <option value="PDF">📄 PDF KI-ANALYSE</option>
                        <option value="CSV">📂 CSV IMPORT</option>
                    </select>
                    <div id="section-pdf" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="question-count" min="1" max="20" value="10" class="p-4 rounded-2xl border-2 border-slate-100 outline-none font-bold">
                            <div class="bg-blue-50 border-2 border-dashed border-blue-200 rounded-2xl p-4 text-center text-xs font-bold text-blue-600 cursor-pointer" onclick="document.getElementById('pdf-file').click()">
                                <input type="file" id="pdf-file" accept="application/pdf" class="hidden">
                                <span id="file-name">PDF WÄHLEN</span>
                            </div>
                        </div>
                        <button onclick="startQuizGeneration()" class="w-full btn-primary text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest">Quiz Erstellen</button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl text-white border-t-4 border-blue-500">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black uppercase tracking-tighter italic">Physics Training</h3>
                    <div id="home-game-score" class="text-3xl font-black text-blue-400">0</div>
                </div>
                <div class="game-viewport">
                    <canvas id="home-canvas" width="320" height="400" class="mx-auto"></canvas>
                    <div id="game-overlay" class="absolute inset-0 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm transition-opacity">
                        <button onclick="startPhysicsGame('home-canvas')" class="bg-white text-slate-900 px-8 py-4 rounded-full font-black hover:scale-110 transition-transform">SPIEL STARTEN</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="quiz-container" class="hidden glass-card shadow-2xl rounded-[2.5rem] p-10 border border-white">
            <div id="quiz-content">
                <div class="flex justify-between items-center mb-8">
                    <span id="q-count" class="text-xs font-black text-blue-600 bg-blue-50 px-4 py-2 rounded-full uppercase"></span>
                    <div class="w-32 bg-slate-100 rounded-full h-3 overflow-hidden">
                        <div id="progress-bar" class="bg-blue-600 h-full w-0"></div>
                    </div>
                </div>
                <h2 id="question-text" class="text-2xl font-bold text-slate-800 mb-8 leading-snug"></h2>
                <div id="options" class="grid grid-cols-1 gap-4"></div>
                <div id="feedback-area" class="hidden mt-10 p-8 rounded-3xl animate-slideIn text-center border-4">
                    <p id="feedback-text" class="text-xl font-black mb-6 uppercase tracking-tight"></p>
                    <button id="next-q-btn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-black uppercase">Weiter</button>
                </div>
            </div>
            <div id="game-screen" class="hidden">
                <div class="text-center mb-6">
                    <h2 class="text-3xl font-black text-slate-900 italic">PAUSE! ⚡</h2>
                    <p class="text-slate-500 font-bold">Sammle 20 Punkte</p>
                </div>
                <div class="game-viewport mx-auto mb-6" style="width: 320px;">
                    <canvas id="game-canvas" width="320" height="400"></canvas>
                </div>
                <div id="game-score" class="text-4xl font-black text-blue-600 text-center">0 / 20</div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let quizData = [], currentIndex = 0, score = 0, gameActive = false, gamePoints = 0;
        let gameInterval, world = { objects: [], particles: [] };

        // --- NEW SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playEffect(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'drop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'merge') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'correct') {
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // --- PHYSICS ENGINE ---
        function startPhysicsGame(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('game-overlay');
            if(overlay) overlay.classList.add('opacity-0', 'pointer-events-none');
            
            gameActive = true; gamePoints = 0;
            world.objects = []; world.particles = [];
            const scoreDisplay = canvasId === 'home-canvas' ? 'home-game-score' : 'game-score';

            canvas.onpointerdown = (e) => {
                if(!gameActive) return;
                const r = canvas.getBoundingClientRect();
                const x = e.clientX - r.left;
                playEffect('drop');
                spawnObject(x, 40);
            };

            function spawnObject(x, y) {
                const types = ['🍎', '🍊', '🍇', '🍋', '🍒'];
                world.objects.push({ x, y, vy: 0, vx: (Math.random()-0.5)*4, radius: 24, emoji: types[Math.floor(Math.random()*types.length)], bounciness: 0.5 });
            }

            if(gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if(!gameActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                for(let i=0; i<world.objects.length; i++) {
                    let obj = world.objects[i];
                    obj.vy += 0.5; obj.y += obj.vy; obj.x += obj.vx;

                    if(obj.y + obj.radius > canvas.height) { obj.y = canvas.height - obj.radius; obj.vy *= -obj.bounciness; obj.vx *= 0.95; }
                    if(obj.x - obj.radius < 0 || obj.x + obj.radius > canvas.width) { obj.vx *= -obj.bounciness; obj.x = obj.x < 0 ? obj.radius : canvas.width - obj.radius; }

                    for(let j=i+1; j<world.objects.length; j++) {
                        let other = world.objects[j];
                        let dx = other.x - obj.x, dy = other.y - obj.y, dist = Math.sqrt(dx*dx + dy*dy), minDist = obj.radius + other.radius;
                        if(dist < minDist) {
                            if(obj.emoji === other.emoji) {
                                playEffect('merge');
                                createExplosion(obj.x, obj.y, '#fbbf24');
                                world.objects.splice(j, 1); world.objects.splice(i, 1);
                                gamePoints += 5; updateScoreUI(scoreDisplay); continue;
                            }
                            let angle = Math.atan2(dy, dx), tx = obj.x + Math.cos(angle) * minDist, ty = obj.y + Math.sin(angle) * minDist;
                            let ax = (tx - other.x) * 0.1, ay = (ty - other.y) * 0.1;
                            obj.vx -= ax; obj.vy -= ay; other.vx += ax; other.vy += ay;
                        }
                    }
                    ctx.font = `40px serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(obj.emoji, obj.x, obj.y);
                }

                world.particles.forEach((p, index) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    if(p.life <= 0) world.particles.splice(index, 1);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1;
            }, 1000/60);
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) world.particles.push({ x, y, color, life: 1, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12 });
        }

        function updateScoreUI(id) {
            const el = document.getElementById(id);
            el.innerText = id === 'game-score' ? `${gamePoints} / 20` : gamePoints;
            if(id === 'game-score' && gamePoints >= 20) { gameActive = false; setTimeout(showQuestion, 800); }
        }

        async function startQuizGeneration() {
            const file = document.getElementById('pdf-file').files[0];
            if (!file) return alert("Wähle ein PDF!");
            toggleCard('status');
            try {
                const base64 = (await toBase64(file)).split(',')[1];
                const res = await fetch('/api/quiz', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pdfBase64: base64, questionCount: document.getElementById('question-count').value }) });
                quizData = await res.json();
                currentIndex = 0; score = 0; toggleCard('quiz-container'); showQuestion();
            } catch (err) { alert("Analyse-Fehler!"); location.reload(); }
        }

        function showQuestion() {
            if (currentIndex === 5 && gamePoints < 20) {
                document.getElementById('quiz-content').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                startPhysicsGame('game-canvas'); return;
            }
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            const q = quizData[currentIndex];
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('progress-bar').style.width = `${(currentIndex/quizData.length)*100}%`;
            document.getElementById('q-count').innerText = `Frage ${currentIndex+1}/${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "p-5 rounded-2xl border-2 border-slate-100 bg-white font-bold text-left hover:bg-blue-50 text-slate-700";
                b.innerText = opt;
                b.onclick = () => {
                    document.querySelectorAll('#options button').forEach(btn => btn.disabled = true);
                    const correct = (i === q.answer);
                    if(correct) { score++; playEffect('correct'); b.classList.add('border-green-500', 'bg-green-50'); }
                    else { b.classList.add('border-red-500', 'bg-red-50'); }
                    document.getElementById('feedback-area').classList.remove('hidden');
                    document.getElementById('feedback-text').innerText = correct ? "Richtig! ✨" : "Falsch! ❌";
                    document.getElementById('next-q-btn').onclick = () => { currentIndex++; (currentIndex < quizData.length) ? showQuestion() : alert("Score: " + score); };
                };
                optDiv.appendChild(b);
            });
        }

        const toBase64 = f => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
        function toggleCard(id) {
            ['setup-card', 'status', 'quiz-container'].forEach(c => document.getElementById(c)?.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
