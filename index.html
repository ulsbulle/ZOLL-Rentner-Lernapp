<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Master & Mini-Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sanfte Animationen */
        #progress-bar { transition: width 0.4s ease-in-out; }
        #game-canvas { cursor: crosshair; background: #f1f5f9; border-radius: 1rem; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .bubble-pop { animation: pop 0.2s ease-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">🧠 PDF Quiz & Play</h1>
            <p class="text-slate-500 italic">Lernen mit KI & Spielpause</p>
        </div>

        <div id="setup-card" class="bg-white shadow-xl rounded-2xl p-8 mb-6 border border-slate-200">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Dein Gemini API Key (wird nur lokal gespeichert)</label>
                    <input type="password" id="api-key" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="AIza...">
                </div>
                
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-blue-400 transition cursor-pointer bg-slate-50" onclick="document.getElementById('pdf-file').click()">
                    <input type="file" id="pdf-file" accept="application/pdf" class="hidden">
                    <div class="text-3xl mb-2">📄</div>
                    <span class="text-slate-600 font-medium" id="file-name">PDF für Quiz auswählen</span>
                </div>

                <button onclick="startFlow()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg disabled:bg-slate-300 disabled:shadow-none" id="gen-btn">
                    Quiz kostenlos generieren
                </button>
            </div>
        </div>

        <div id="status" class="hidden text-center p-10 bg-white rounded-2xl shadow-md border border-slate-100">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mb-4 mx-auto"></div>
            <p id="status-text" class="text-slate-700 font-medium mb-2 font-mono">KI wird vorbereitet...</p>
            <p id="retry-timer" class="text-red-500 font-bold hidden"></p>
        </div>

        <div id="quiz-container" class="hidden bg-white shadow-2xl rounded-2xl p-8 border border-slate-200 relative overflow-hidden">
            <div class="w-full bg-slate-100 rounded-full h-2 mb-6">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
            </div>

            <div id="quiz-content">
                <div class="flex justify-between items-center mb-6">
                    <span id="q-count" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">Frage 1 / 5</span>
                    <span id="active-model-badge" class="text-slate-400 text-[10px] font-mono tracking-tighter"></span>
                </div>
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug text-center"></h2>
                <div id="options" class="space-y-3"></div>
            </div>

            <div id="game-screen" class="hidden text-center py-4">
                <h2 class="text-2xl font-bold text-blue-600 mb-2">Spielpause! 🎮</h2>
                <p class="text-slate-500 mb-4 text-sm">Zerplatze 10 Blasen, um fortzufahren!</p>
                <div class="relative inline-block border border-slate-200 rounded-xl overflow-hidden shadow-inner">
                    <canvas id="game-canvas" width="300" height="300"></canvas>
                    <div id="game-score" class="absolute top-2 right-4 font-bold text-blue-500 text-xl font-mono">0 / 10</div>
                </div>
            </div>

            <div id="result-screen" class="hidden text-center py-6">
                <div class="text-6xl mb-4">🏆</div>
                <h2 class="text-3xl font-bold text-slate-800">Ergebnis</h2>
                <p id="score-display" class="text-xl text-slate-600 mt-2 mb-8"></p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Neustart</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let retryCount = 0;
        const MAX_RETRIES = 2;
        
        // Game Variablen
        let gameScore = 0;
        let gameActive = false;
        let currentBubble = { x: 0, y: 0, r: 25 };

        // Key laden
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
        };

        // File-Name
        document.getElementById('pdf-file').onchange = (e) => {
            if(e.target.files.length > 0) document.getElementById('file-name').innerText = e.target.files[0].name;
        };

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function startFlow() {
            const key = document.getElementById('api-key').value.trim();
            const file = document.getElementById('pdf-file').files[0];
            if(!key || !file) return alert("Key und PDF fehlen!");
            
            localStorage.setItem('gemini_key', key);
            document.getElementById('gen-btn').disabled = true;
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            
            runAiProcess(key, file);
        }

        async function runAiProcess(key, file) {
            const statusText = document.getElementById('status-text');
            const retryTimer = document.getElementById('retry-timer');

            try {
                // 1. DYNAMISCHE MODELL-SUCHE
                statusText.innerText = "Modelle werden geprüft...";
                const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const modelsData = await modelsRes.json();
                if(modelsData.error) throw modelsData.error;

                const modelList = ["gemini-2.0-flash", "gemini-1.5-flash", "gemini-pro"];
                let chosenPath = "";
                for(let mName of modelList) {
                    const found = modelsData.models.find(gm => gm.name.includes(mName));
                    if(found) { chosenPath = found.name; break; }
                }
                if(!chosen
