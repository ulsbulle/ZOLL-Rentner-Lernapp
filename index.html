<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz & Mini-Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #progress-bar { transition: width 0.4s ease-in-out; }
        #game-canvas { cursor: crosshair; background: #f8fafc; border-radius: 1rem; }
        .bubble { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div id="setup-card" class="bg-white shadow-xl rounded-2xl p-8 mb-6 border border-slate-200">
            <h1 class="text-3xl font-bold text-blue-600 text-center mb-6">🧠 Quiz & Play</h1>
            <div class="space-y-6">
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-blue-400 transition cursor-pointer" onclick="document.getElementById('pdf-file').click()">
                    <input type="file" id="pdf-file" accept="application/pdf" class="hidden">
                    <span class="text-slate-600 font-medium" id="file-name">PDF für Quiz hochladen</span>
                </div>
                <button onclick="startFlow()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg">Quiz starten</button>
            </div>
        </div>

        <div id="status" class="hidden text-center p-10 bg-white rounded-2xl shadow-md border border-slate-100">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mx-auto mb-4"></div>
            <p id="status-text" class="text-slate-700 font-medium">KI analysiert PDF...</p>
        </div>

        <div id="quiz-container" class="hidden bg-white shadow-2xl rounded-2xl p-8 border border-slate-200 relative overflow-hidden">
            <div class="w-full bg-slate-100 rounded-full h-2 mb-6">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
            </div>

            <div id="quiz-content">
                <div class="flex justify-between items-center mb-6 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <span id="q-count">Frage 1 / 5</span>
                    <span>AI Quiz</span>
                </div>
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 text-center leading-snug"></h2>
                <div id="options" class="space-y-3"></div>
            </div>

            <div id="game-screen" class="hidden text-center py-4">
                <h2 class="text-2xl font-bold text-blue-600 mb-2">Pause! 🎮</h2>
                <p class="text-slate-500 mb-4 text-sm">Zerplatze 10 Blasen, um fortzufahren!</p>
                <div class="relative inline-block border border-slate-200 rounded-xl overflow-hidden shadow-inner">
                    <canvas id="game-canvas" width="300" height="300"></canvas>
                    <div id="game-score" class="absolute top-2 right-4 font-bold text-blue-500 text-xl">0 / 10</div>
                </div>
            </div>

            <div id="result-screen" class="hidden text-center py-6">
                <div class="text-6xl mb-4">🏆</div>
                <h2 class="text-3xl font-bold text-slate-800">Ergebnis</h2>
                <p id="score-display" class="text-xl text-slate-600 mt-2 mb-8"></p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Neustart</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let gameScore = 0;
        let gameActive = false;

        async function startFlow() {
            const file = document.getElementById('pdf-file').files[0];
            if(!file) return alert("PDF fehlt!");
            
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            
            // HINWEIS: Hier rufen wir dein Backend /api/generate auf
            try {
                const base64Data = await toBase64(file);
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pdfBase64: base64Data.split(',')[1] })
                });

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;
                quizData = JSON.parse(rawText.replace(/```json|```/g, "").trim());
                
                document.getElementById('status').classList.add('hidden');
                document.getElementById('quiz-container').classList.remove('hidden');
                showQuestion();
            } catch (err) {
                alert("Fehler: " + err.message);
                location.reload();
            }
        }

        function showQuestion() {
            // NACH 3 FRAGEN -> MINISPIEL STARTEN
            if (currentIndex === 3 && gameScore < 10) {
                startMiniGame();
                return;
            }

            const q = quizData[currentIndex];
            const progress = ((currentIndex) / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('q-count').innerText = `Frage ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition-all font-medium";
                btn.innerText = opt;
                btn.onclick = () => { if(i === q.answer) score++; currentIndex++; (currentIndex < quizData.length) ? showQuestion() : showResults(); };
                optContainer.appendChild(btn);
            });
        }

        // --- MINI GAME LOGIK ---
        function startMiniGame() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            gameActive = true;
            let bubble = { x: 150, y: 150, r: 30 };

            function draw() {
                if(!gameActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI * 2);
                ctx.fillStyle = '#3b82f6';
                ctx.fill();
                ctx.closePath();
            }

            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const dist = Math.sqrt((mx - bubble.x)**2 + (my - bubble.y)**2);
                
                if(dist < bubble.r) {
                    gameScore++;
                    document.getElementById('game-score').innerText = `${gameScore} / 10`;
                    bubble.x = Math.random() * (canvas.width - 60) + 30;
                    bubble.y = Math.random() * (canvas.height - 60) + 30;
                    if(gameScore >= 10) {
                        gameActive = false;
                        document.getElementById('game-screen').classList.add('hidden');
                        document.getElementById('quiz-content').classList.remove('hidden');
                        showQuestion(); // Zurück zum Quiz
                    }
                }
            };
            
            function loop() { if(gameActive) { draw(); requestAnimationFrame(loop); } }
            loop();
        }

        function showResults() {
            document.getElementById('progress-bar').style.width = `100%`;
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score} von ${quizData.length} richtig!`;
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = e => reject(e);
        });
    </script>
</body>
</html>
