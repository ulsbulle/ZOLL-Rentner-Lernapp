<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator - Smart Retry Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">🧠 PDF Quiz Master</h1>
            <p class="text-slate-500 italic">Mit intelligentem Quota-Management</p>
        </div>

        <div id="setup-card" class="bg-white shadow-xl rounded-2xl p-8 mb-6 border border-slate-200">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Gemini API Key</label>
                    <input type="password" id="api-key" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="AIza...">
                </div>
                
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-blue-400 transition cursor-pointer bg-slate-50" onclick="document.getElementById('pdf-file').click()">
                    <input type="file" id="pdf-file" accept="application/pdf" class="hidden">
                    <div class="text-3xl mb-2">📄</div>
                    <span class="text-slate-600 font-medium" id="file-name">PDF auswählen</span>
                </div>

                <button onclick="startQuizGeneration()" id="gen-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                    Quiz generieren
                </button>
            </div>
        </div>

        <div id="status" class="hidden text-center p-10 bg-white rounded-2xl shadow-md border border-slate-100">
            <div id="loader" class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mb-4"></div>
            <p id="status-text" class="text-slate-700 font-medium mb-2">Bereite vor...</p>
            <p id="retry-timer" class="text-red-500 font-bold hidden"></p>
        </div>

        <div id="quiz-container" class="hidden bg-white shadow-2xl rounded-2xl p-8 border border-slate-200">
            <div id="quiz-content">
                <div class="flex justify-between items-center mb-6">
                    <span id="q-count" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase">Frage 1 / 5</span>
                    <span id="active-model-badge" class="text-slate-300 text-[10px] font-mono tracking-tighter"></span>
                </div>
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug"></h2>
                <div id="options" class="space-y-3"></div>
            </div>

            <div id="result-screen" class="hidden text-center py-6">
                <div class="text-6xl mb-4">🏆</div>
                <h2 class="text-3xl font-bold text-slate-800">Ergebnis</h2>
                <p id="score-display" class="text-xl text-slate-600 mt-2 mb-8"></p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Neustart</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let retryCount = 0;
        const MAX_RETRIES = 2;

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
        };

        document.getElementById('pdf-file').onchange = (e) => {
            if(e.target.files.length > 0) document.getElementById('file-name').innerText = e.target.files[0].name;
        };

        // Hilfsfunktion für Pause (Warten)
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function startQuizGeneration() {
            const key = document.getElementById('api-key').value.trim();
            const file = document.getElementById('pdf-file').files[0];
            if(!key || !file) return alert("Key und PDF fehlen!");
            
            localStorage.setItem('gemini_key', key);
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            
            processWithAI(key, file);
        }

        async function processWithAI(key, file) {
            const statusText = document.getElementById('status-text');
            const retryTimer = document.getElementById('retry-timer');

            try {
                // 1. Modell-Check
                statusText.innerText = "Verbindung wird geprüft...";
                const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const modelsData = await modelsRes.json();
                
                if(modelsData.error) throw modelsData.error;

                const chosenModel = "gemini-1.5-flash"; // Standard-Modell
                document.getElementById('active-model-badge').innerText = chosenModel;

                // 2. PDF Umwandlung
                statusText.innerText = "PDF wird analysiert...";
                const base64Data = await toBase64(file);
                
                // 3. KI Anfrage
                statusText.innerText = "KI generiert Quizfragen...";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${chosenModel}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Erstelle 5 schwere Multiple-Choice-Fragen auf Deutsch zum Inhalt dieses PDFs. Antworte NUR als valides JSON-Array: [{'question':'?','options':['A','B','C','D'],'answer':0}]." },
                                { inlineData: { mimeType: "application/pdf", data: base64Data.split(',')[1] } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if(data.error) throw data.error;

                let rawText = data.candidates[0].content.parts[0].text;
                quizData = JSON.parse(rawText.replace(/```json|```/g, "").trim());
                
                document.getElementById('status').classList.add('hidden');
                document.getElementById('quiz-container').classList.remove('hidden');
                showQuestion();

            } catch (err) {
                console.error("Fehler-Details:", err);

                // Check auf Quota Error (429)
                if ((err.code === 429 || err.status === "RESOURCE_EXHAUSTED") && retryCount < MAX_RETRIES) {
                    retryCount++;
                    statusText.innerText = `Quota voll! Automatische Wiederholung (${retryCount}/${MAX_RETRIES})...`;
                    retryTimer.classList.remove('hidden');
                    
                    // 30 Sekunden Countdown
                    for (let i = 30; i > 0; i--) {
                        retryTimer.innerText = `Nächster Versuch in ${i} Sekunden...`;
                        await delay(1000);
                    }
                    
                    retryTimer.classList.add('hidden');
                    processWithAI(key, file); // Rekursiver Aufruf
                } else {
                    alert("Kritischer Fehler: " + (err.message || "Unbekannter KI-Fehler"));
                    location.reload();
                }
            }
        }

        function showQuestion() {
            const q = quizData[currentIndex];
            document.getElementById('q-count').innerText = `Frage ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition-all font-medium text-slate-700";
                btn.innerText = opt;
                btn.onclick = () => { if(i === q.answer) score++; currentIndex++; (currentIndex < quizData.length) ? showQuestion() : showResults(); };
                optContainer.appendChild(btn);
            });
        }

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score} von ${quizData.length} richtig!`;
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = e => reject(e);
        });
    </script>
</body>
</html>
